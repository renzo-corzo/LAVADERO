databases:
  - name: lavadero-db
    databaseName: lavadero
    user: lavadero
    plan: free # cambiar a "starter" para datos persistentes (la free expira a los ~90 días)
    region: virginia # región más cercana a Argentina; usar la misma que el web service

services:
  - type: web
    name: lavadero
    runtime: node
    region: virginia
    plan: free
    buildCommand: npm install && npm run build
    # Arranca la app directamente. NO corremos "prisma migrate deploy" acá porque
    # en el free tier el advisory lock de Prisma se queda colgado (P1002) y bloquea
    # el arranque. Las migraciones se aplican manualmente contra la URL externa
    # de la base (o desde el dashboard) cuando cambia el schema.
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Zona horaria del negocio: toda la lógica de horarios/cierres del server
      # (setHours, "hoy", "horario pasado") debe calcular en hora argentina,
      # no en UTC (default de Render).
      - key: TZ
        value: America/Argentina/Buenos_Aires
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # Render inyecta automáticamente la cadena de conexión de la base de arriba.
      - key: DATABASE_URL
        fromDatabase:
          name: lavadero-db
          property: connectionString
      # Generar con: openssl rand -base64 32 (cargar como secreto en el dashboard)
      - key: NEXTAUTH_SECRET
        sync: false
      # URL pública del servicio (ej: https://lavadero.onrender.com)
      - key: NEXTAUTH_URL
        sync: false

